    type: utf8
    nullable: true
    description: "Basis for action 2"

  - name: basiscd3
    type: utf8
    nullable: true
    description: "Basis for action 3"

  - name: basiscd4
    type: utf8
    nullable: true
    description: "Basis for action 4"

  - name: basiscd5
    type: utf8
    nullable: true
    description: "Basis for action 5"

  - name: aalentyp
    type: utf8
